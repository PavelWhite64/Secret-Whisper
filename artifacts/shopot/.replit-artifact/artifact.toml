kind = "web"
previewPath = "/"
title = "Шёпот"
version = "1.0.0"
id = "artifacts/shopot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22075
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/shopot run dev"

[services.env]
PORT = "22075"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/shopot", "run", "build"]
publicDir = "artifacts/shopot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
