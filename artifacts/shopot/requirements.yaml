packages:
  "framer-motion": "Smooth animations for modals, dropdowns, and page transitions"
  "date-fns": "For precise and readable time formatting in the countdowns"
  "lucide-react": "Beautiful, consistent iconography"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to resolve Tailwind CSS class conflicts"
  "@hookform/resolvers": "Zod validation integration for react-hook-form"
  "react-hook-form": "Performant, flexible and extensible forms with easy-to-use validation"
  "sonner": "An opinionated toast component for React for elegant notifications"

images:
  - path: "artifacts/shopot/public/images/mystic-bg.png"
    description: "Deep, mysterious, dark atmospheric background with subtle ethereal purple and magenta smoky nebulas on a near-black canvas. Very subtle, minimal distractions, perfectly suited for a dark mode website background."
    aspect_ratio: "16:9"

notes:
  - "The app relies on cookies for authentication; ensure SameSite=None and Secure=true is properly handled by the backend proxy."
  - "Using wouter for lightweight routing."
  - "Tanstack Query is used for all API state management."
